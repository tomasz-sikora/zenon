# HTTP server — serves the app directly so http://localhost:8080 works
# without needing to trust the self-signed TLS certificate.
# `localhost` is treated as a secure context by browsers so WebGPU /
# SharedArrayBuffer / COEP headers all work over plain HTTP here.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://proxy:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    location /health {
        proxy_pass http://proxy:3001/health;
        proxy_http_version 1.1;
    }

    location /ollama/ {
        proxy_pass http://host.docker.internal:11434/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    # Use ^~ so this prefix match wins over any regex location below,
    # preventing the immutable static-assets rule from catching .onnx files.
    # Model files are never content-hashed so they must always be revalidated.
    location ^~ /models/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # index.html must never be cached: it contains Vite asset hashes that
        # change on every build, and stale HTML causes the browser to load the
        # old worker bundle (and therefore the old default model).
        add_header Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → backend proxy service
    location /api/ {
        proxy_pass http://proxy:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE / streaming support
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    location /health {
        proxy_pass http://proxy:3001/health;
        proxy_http_version 1.1;
    }

    # Bridge to Ollama running on the Docker host
    location /ollama/ {
        proxy_pass http://host.docker.internal:11434/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # OpenAI-compatible streaming responses
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    # Pre-fetched ONNX model files — return 404 for missing assets so that
    # transformers.js gets a proper HTTP error instead of the index.html SPA
    # fallback (which would cause a JSON parse error inside the worker).
    # Use ^~ so this prefix match wins over any regex location below,
    # preventing the immutable static-assets rule from catching .onnx files.
    # Model files are never content-hashed so they must always be revalidated.
    location ^~ /models/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        # index.html must never be cached: it contains Vite asset hashes that
        # change on every build, and stale HTML causes the browser to load the
        # old worker bundle (and therefore the old default model).
        # Required for SharedArrayBuffer (Pyodide, WASM models) and embedding worker
        add_header Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Cache Vite-hashed static assets aggressively (JS/CSS/fonts/wasm).
    # Note: .onnx and .onnx_data are intentionally excluded — those live in
    # /models/ and are handled by the ^~ block above.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }
}
